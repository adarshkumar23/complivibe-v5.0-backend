<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    .container { max-width: 600px; margin: 20px auto; background: #fff; padding: 32px; border-radius: 8px; }
    .header { background: #1a1a2e; color: #fff; padding: 20px 32px; border-radius: 8px 8px 0 0; }
    .header h1 { margin: 0; font-size: 20px; }
    .content { padding: 24px 0; color: #333; }
    .cta-button { display: inline-block; background: #4f46e5; color: #fff; padding: 12px 24px; border-radius: 6px; text-decoration: none; margin: 16px 0; }
    .footer { font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 16px; margin-top: 24px; }
    .urgent { color: #b91c1c; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CompliVibe</h1>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    This is an automated notification from CompliVibe.
    {{ org_name }} · {{ current_year }}<br>
    You are receiving this because you are a
    compliance team member.
  </div>
</div>
</body>
</html>
